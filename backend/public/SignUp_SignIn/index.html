<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login/Signup Form</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
        <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; }
        .container { display: flex; gap: 20px; }
        .form-container { flex: 1; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .message { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        #app { display: none; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="form-box login" id="registerForm">
        <form action="#">
          <h1>Login</h1>
          <div class="input-box">
            <input type="text" placeholder="Username" required />
            <i class="bx bxs-user"></i>
          </div>
          <div class="input-box">
            <input type="password" placeholder="Password" required />
            <i class="bx bxs-lock-alt"></i>
          </div>
          <div class="forgot-link">
            <a href="#">Forgot Password?</a>
          </div>
          <button class="btn" onclick="login()">Login</button>
          <p>or login with social platforms</p>
          <div class="social-icons">
            <a href="#"><i class="bx bxl-google"></i></a>
            <a href="#"><i class="bx bxl-facebook"></i></a>
            <a href="#"><i class="bx bxl-github"></i></a>
            <a href="#"><i class="bx bxl-linkedin"></i></a>
          </div>
        </form>
      </div>

      <div class="form-box register" id="loginForm">
        <form action="#">
          <h1>Registration</h1>
          <div class="input-box">
            <input type="text" placeholder="Username" required />
            <i class="bx bxs-user"></i>
          </div>
          <div class="input-box">
            <input type="email" placeholder="Email" required />
            <i class="bx bxs-envelope"></i>
          </div>
          <div class="input-box">
            <input type="password" placeholder="Password" required />
            <i class="bx bxs-lock-alt"></i>
          </div>
          <button type="submit" class="btn" onclick="register()">Register</button>
          <p>or register with social platforms</p>
          <div class="social-icons">
            <a href="#"><i class="bx bxl-google"></i></a>
            <a href="#"><i class="bx bxl-facebook"></i></a>
            <a href="#"><i class="bx bxl-github"></i></a>
            <a href="#"><i class="bx bxl-linkedin"></i></a>
          </div>
        </form>
      </div>

      <div class="toggle-box">
        <div class="toggle-panel toggle-left">
          <h1>Hello, Welcome!</h1>
          <p>Don't have an account?</p>
          <button class="btn register-btn">Register</button>
        </div>

        <div class="toggle-panel toggle-right">
          <h1>Welcome Back!</h1>
          <p>Already have an account?</p>
          <button class="btn login-btn">Login</button>
        </div>
      </div>
    </div>

        <!-- Interface chat (cachée par défaut) -->
    <div id="app">
        <h2>Bienvenue <span id="userName"></span> !</h2>
        <button onclick="logout()">Déconnexion</button>
        
        <h3>Votre token :</h3>
        <pre id="tokenDisplay" style="background: #f4f4f4; padding: 10px; overflow: auto;"></pre>
        
        <h3>Test route protégée :</h3>
        <button onclick="testProtected()">Tester route protégée</button>
        <div id="protectedResult"></div>
    </div>

    <script src="./script.js"></script>
    <script>
        let currentToken = null;

        async function register() {
            const name = document.getElementById('registerName').value;
            const phoneNumber = document.getElementById('registerPhone').value;
            const password = document.getElementById('registerPassword').value;

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phoneNumber, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    showMessage('Inscription réussie ! Vous pouvez vous connecter.', 'success');
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('Erreur: ' + error.message, 'error');
            }
        }

        async function login() {
            const phoneNumber = document.getElementById('loginPhone').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    currentToken = data.token;
                    document.getElementById('registerForm').style.display = 'none';
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    document.getElementById('userName').textContent = data.user.name;
                    document.getElementById('tokenDisplay').textContent = data.token;
                    showMessage('Connexion réussie !', 'success');
                } else {
                    showMessage(data.message, 'error');
                }
            } catch (error) {
                showMessage('Erreur: ' + error.message, 'error');
            }
        }

        async function testProtected() {
            try {
                const response = await fetch('/api/protected', {
                    headers: {
                        'Authorization': 'Bearer ' + currentToken
                    }
                });

                const data = await response.json();
                document.getElementById('protectedResult').innerHTML = 
                    '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('protectedResult').innerHTML = 
                    '<div class="error">Erreur: ' + error.message + '</div>';
            }
        }

        function logout() {
            currentToken = null;
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('app').style.display = 'none';
            document.getElementById('loginPhone').value = '';
            document.getElementById('loginPassword').value = '';
        }

        function showMessage(text, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
            document.body.insertBefore(messageDiv, document.body.firstChild);
            setTimeout(() => messageDiv.remove(), 3000);
        }
    </script>
  </body>
</html>
