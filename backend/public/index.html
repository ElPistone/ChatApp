<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat App</title>
    <link rel="stylesheet" href=".//css/login_register.css" />
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <!-- Page d'authentification -->
    <div id="auth-page" class="container">
        <!-- Formulaire de connexion -->
        <div class="form-box login" id="login-form">
            <form action="#">
                <h1>Connexion</h1>
                <div class="input-box">
                    <input type="text" id="login-phone" placeholder="Téléphone..." required />
                    <i class="bx bxs-phone"></i>
                </div>
                <div class="input-box">
                    <input type="password" id="login-password" placeholder="Mot de passe..." required />
                    <i class="bx bxs-lock-alt"></i>
                </div>
                <div class="forgot-link">
                    <a href="#">Mot de passe oublié?</a>
                </div>
                <button type="button" class="btn" id="login-btn">Se connecter</button>
                <p>ou connectez-vous avec</p>
                <div class="social-icons">
                    <a href="#"><i class="bx bxl-google"></i></a>
                    <a href="#"><i class="bx bxl-facebook"></i></a>
                    <a href="#"><i class="bx bxl-github"></i></a>
                    <a href="#"><i class="bx bxl-linkedin"></i></a>
                </div>
            </form>
        </div>

        <!-- Formulaire d'inscription -->
        <div class="form-box register" id="register-form" style="display: none;">
            <form action="#">
                <h1>Inscription</h1>
                <div class="input-box">
                    <input type="text" id="register-name" placeholder="Nom..." required />
                    <i class="bx bxs-user"></i>
                </div>
                <div class="input-box">
                    <input type="text" id="register-phone" placeholder="Téléphone..." required />
                    <i class="bx bxs-phone"></i>
                </div>
                <div class="input-box">
                    <input type="password" id="register-password" placeholder="Mot de passe..." required />
                    <i class="bx bxs-lock-alt"></i>
                </div>
                <button type="button" class="btn" id="register-btn">S'inscrire</button>
                <p>ou inscrivez-vous avec</p>
                <div class="social-icons">
                    <a href="#"><i class="bx bxl-google"></i></a>
                    <a href="#"><i class="bx bxl-facebook"></i></a>
                    <a href="#"><i class="bx bxl-github"></i></a>
                    <a href="#"><i class="bx bxl-linkedin"></i></a>
                </div>
            </form>
        </div>

        <!-- Panneau de basculement -->
        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Salut, Bienvenue!</h1>
                <p>Vous n'avez pas de compte?</p>
                <button class="btn register-btn" id="show-register">S'inscrire</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>Bienvenue !</h1>
                <p>Vous avez déjà un compte?</p>
                <button class="btn login-btn" id="show-login">Se connecter</button>
            </div>
        </div>
    </div>

    <!-- Interface de chat (cachée par défaut) -->
    <div id="chat-page" class="chat-container" style="display: none;">
        <!-- Sidebar gauche (33%) -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <h3 id="current-user-name"></h3>
                    <button class="logout-btn" id="logout-btn">Déconnexion</button>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Rechercher un numéro...">
                    <div id="search-results" class="search-results"></div>
                </div>
            </div>
            
            <div class="conversations-list" id="conversations-list">
                <!-- Les conversations seront chargées ici -->
                <div class="loading">Aucune conversation</div>
            </div>
        </div>
        
        <!-- Partie droite (67%) - Zone de chat -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-header-info">
                    <div class="chat-header-name" id="chat-header-name">Sélectionnez une conversation</div>
                    <div class="chat-header-status" id="chat-header-status"></div>
                </div>
            </div>
            
            <div class="messages-container" id="messages-container">
                <!-- Les messages seront affichés ici -->
            </div>
            
            <div class="message-input-area">
                <div class="typing-indicator" id="typing-indicator">
                    Quelqu'un tape...
                </div>
                <div class="input-container">
                    <input type="file" id="file-input" class="file-input">
                    <button class="attach-btn" id="attach-btn" title="Ajouter un fichier"><i class='bx bx-paperclip'></i></button>
                    <input type="text" id="message-input" placeholder="Votre message..." disabled>
                    <button class="send-btn" id="send-btn" disabled title="Envoyer"><i class='bx bxs-send'></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Modal Container -->
    <div id="modal-container"></div>

    <script src="./js/script.js"></script>
    <script src="./js/chat.js"></script>
</body>
</html>
